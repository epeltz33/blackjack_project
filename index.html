<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/style.css">
    <script defer src="./src/js/main.js"></script>
    <title>Blackjack</title>
</head>

<body>
    <header class="site-header">
        <h1>Blackjack</h1>
        <p>Come and try your luck!</p>
    </header>

    <main class="game-main">
        <div class="game-layout">

            <section class="panel dealer-panel">
                <h3>Dealer</h3>
                <div class="dealerCards"></div>
                <div class="dealer-count"></div>
            </section>

            <div class="message-area">
                <blockquote></blockquote>
            </div>

            <section class="panel player-panel">
                <h3>Player</h3>
                <div class="playerHands">
                    <div class="playerCards"></div>
                    <div class="player-count"></div>
                    <div class="splitCards"></div>
                    <div class="split-count"></div>
                </div>

                <div class="player-info">
                    <span id="money-left"></span>
                    <span id="submittedBet"></span>
                    <span id="splitBet"></span>
                </div>

                <!-- Bet phase: input + Bet, then Clear + Deal -->
                <div class="bet-phase">
                    <div class="btn-row" id="bet-input-row">
                        <input type="number" id="betAmount" placeholder="Enter bet amount" min="1">
                        <button id="betButton">Bet</button>
                    </div>
                    <div class="btn-row" id="bet-action-row" style="display:none">
                        <button id="clearButton">Clear</button>
                        <button id="dealButton">Deal</button>
                    </div>
                </div>

                <!-- Play phase: Hit, Stand, Double, Split -->
                <div class="play-phase" style="display:none">
                    <button id="hitButton">Hit</button>
                    <button id="standButton">Stand</button>
                    <button id="doubleButton">Double</button>
                    <button id="splitButton" style="display:none">Split</button>
                </div>

                <!-- Post-hand: Play Again or Reset -->
                <div class="post-hand" style="display:none">
                    <button id="playAgain">Play Again?</button>
                    <button id="resetButton" style="display:none">Reset Game?</button>
                </div>
            </section>

        </div>
    </main>

</body>

</html>
